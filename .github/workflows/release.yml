---
name: Release
on:
  push:
    tags: ["*"]
  workflow_dispatch:

permissions:
  actions: read
  attestations: read
  checks: write
  contents: write
  deployments: read
  discussions: read
  id-token: write
  issues: read
  pages: read
  packages: write
  pull-requests: write
  repository-projects: read
  security-events: read
  statuses: write

jobs:
  check-image:
    name: Check if Docker image exists
    runs-on: ubuntu-latest
    outputs:
      image-exists: ${{ steps.check.outputs.exists }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Get tag
        id: tag
        run: |
          echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Check if image exists
        id: check
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          # Check if image exists in DockerHub
          if docker manifest inspect "marcinbojko/grafana:$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "✅ Image already exists: $TAG"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "❌ Image does not exist: $TAG"
          fi

  build-if-needed:
    needs: check-image
    name: Build Docker Image (if needed)
    if: needs.check-image.outputs.image-exists != 'true'
    uses: marcinbojko/reusable-workflows/.github/workflows/docker_build_and_push.yml@main
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  create-release:
    needs: [check-image, build-if-needed]
    if: always() && needs.check-image.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # need all tags to decide the 'Latest' badge

      # Decide the 'Latest' badge deterministically, independent of which parallel
      # release run finishes last. Our tags ("13.0.1-security-01.20260602") aren't
      # valid semver, so GitHub would otherwise mark whichever release publishes last
      # as latest. We instead mark latest ONLY when this tag is the highest version.
      # normalize(): drop the trailing .YYYYMMDD, unify '+' → '-' (historical tags),
      # and treat a plain release as "-security-00" so a security release of the same
      # patch sorts above its base while a higher minor/patch still wins.
      - name: Decide if this tag is the newest version
        id: latest
        run: |
          normalize() {
            local v="${1%.[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]}"
            v="${v//+/-}"
            case "$v" in
              *-security-*) : ;;
              *) v="${v}-security-00" ;;
            esac
            printf '%s\n' "$v"
          }
          CUR=$(normalize "${{ needs.check-image.outputs.tag }}")
          NEWEST=$(git tag | grep -E '^[0-9]' | while read -r t; do normalize "$t"; done | sort -V | tail -n1)
          if [ "${CUR}" = "${NEWEST}" ]; then
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
            echo "✅ ${{ needs.check-image.outputs.tag }} is the newest version → Latest"
          else
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ Newer version exists (${NEWEST}) → not Latest"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-image.outputs.tag }}
          generate_release_notes: true
          make_latest: ${{ steps.latest.outputs.make_latest }}
          body: |
            ## Docker Image
            `marcinbojko/grafana:${{ needs.check-image.outputs.tag }}`
            ${{ needs.check-image.outputs.image-exists == 'true' && '🎯 **Used existing Docker image**' || '🏗️ **Built new Docker image**' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
