---
# Watches for new Grafana releases (major >= 12, non-prerelease).
# On a new version: updates Dockerfile, commits to master, pushes a tag → triggers release.yml.
#
# REQUIRED SECRET: GH_PAT — Personal Access Token with 'repo' scope.
# GITHUB_TOKEN cannot trigger downstream workflows on push.

name: Grafana Release Watcher

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch: # checkov:skip=CKV_GHA_7:force_build is an intentional manual override
    inputs:
      force_build:
        description: "Force build even if this Grafana version is already tagged"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  check-and-update:
    name: Check for new Grafana release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Fetch qualifying Grafana releases and build new ones
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_BUILD: ${{ inputs.force_build }}
        run: |
          RELEASES=$(curl -sf \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/grafana/grafana/releases?per_page=20")

          DATE=$(date +%Y%m%d)

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BUILT=0

          # Collect qualifying versions: non-prerelease, major >= 12, not yet tagged (unless forced)
          # Sanitize + → - (Docker tags don't allow +; Grafana Docker Hub uses - for security releases)
          # Group by major.minor, keep only the highest patch per branch
          VERSIONS=$(echo "$RELEASES" | jq -r '
            .[]
            | select(.prerelease == false)
            | .tag_name | ltrimstr("v")
          ' | sed 's/+/-/g' \
            | awk -F. '
            $1 >= 12 {
              key = $1 "." $2
              if (!seen[key] || ($3 + 0) >= patch[key]) {
                seen[key] = $0
                patch[key] = $3 + 0
              }
            }
            END { for (k in seen) print seen[k] }
          ' | sort -V)

          echo "Qualifying Grafana versions (latest patch per branch):"
          echo "${VERSIONS}"

          while IFS= read -r VERSION; do
            [ -z "${VERSION}" ] && continue

            EXISTING=$(git tag --list "${VERSION}.*")
            if [ -n "${EXISTING}" ] && [ "${FORCE_BUILD}" != "true" ]; then
              echo "Skip ${VERSION}: already tagged (${EXISTING})"
              continue
            fi

            NEW_LABEL="${VERSION}.${DATE}"
            echo "Building ${NEW_LABEL}..."

            sed -i "s/ARG GRAFANA_VERSION=\"[^\"]*\"/ARG GRAFANA_VERSION=\"${VERSION}\"/" Dockerfile
            sed -i "s/LABEL version=\"[^\"]*\"/LABEL version=\"${NEW_LABEL}\"/"           Dockerfile

            echo "Dockerfile after update:"
            grep -E "ARG GRAFANA_VERSION|LABEL version" Dockerfile

            git add Dockerfile
            git commit -m "${NEW_LABEL}"
            git tag "${NEW_LABEL}"
            git push origin HEAD:master
            git push origin "${NEW_LABEL}"

            echo "Pushed commit and tag: ${NEW_LABEL} — release.yml will now handle the build"
            BUILT=$((BUILT + 1))
          done <<< "${VERSIONS}"

          echo "========================================"
          echo "  Grafana Release Watcher — Done"
          echo "  Versions processed: ${BUILT}"
          echo "========================================"
