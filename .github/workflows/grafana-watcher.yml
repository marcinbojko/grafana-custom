---
# Watches for new Grafana releases (major >= 12, non-prerelease).
# On a new version: updates Dockerfile, commits to master, pushes a tag → triggers release.yml.
#
# REQUIRED SECRET: GH_PAT — Personal Access Token with 'repo' scope.
# GITHUB_TOKEN cannot trigger downstream workflows on push.

name: Grafana Release Watcher

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch: # checkov:skip=CKV_GHA_7:force_build is an intentional manual override
    inputs:
      force_build:
        description: "Force build even if this Grafana version is already tagged"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  check-and-update:
    name: Check for new Grafana release
    runs-on: ubuntu-latest

    steps:
      - name: Fetch latest Grafana release
        id: grafana
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_JSON=$(curl -sf \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/grafana/grafana/releases/latest")

          TAG=$(echo "$RELEASE_JSON"        | jq -r '.tag_name')
          PRERELEASE=$(echo "$RELEASE_JSON" | jq -r '.prerelease')
          PUBLISHED=$(echo "$RELEASE_JSON"  | jq -r '.published_at')
          VERSION="${TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)

          {
            echo "tag=${TAG}"
            echo "version=${VERSION}"
            echo "major=${MAJOR}"
            echo "prerelease=${PRERELEASE}"
            echo "published=${PUBLISHED}"
          } >> "$GITHUB_OUTPUT"

          echo "Latest Grafana release: ${TAG} (pre-release: ${PRERELEASE}, published: ${PUBLISHED})"

      - name: Filter — major >= 12, non-prerelease
        id: filter
        run: |
          MAJOR="${{ steps.grafana.outputs.major }}"
          PRERELEASE="${{ steps.grafana.outputs.prerelease }}"

          if [ "${PRERELEASE}" = "true" ]; then
            echo "qualifies=false" >> "$GITHUB_OUTPUT"
            echo "Skip: ${{ steps.grafana.outputs.tag }} is a pre-release"
          elif [ "${MAJOR}" -ge 12 ]; then
            echo "qualifies=true" >> "$GITHUB_OUTPUT"
            echo "Qualifies: ${{ steps.grafana.outputs.version }} (major=${MAJOR})"
          else
            echo "qualifies=false" >> "$GITHUB_OUTPUT"
            echo "Skip: major ${MAJOR} < 12"
          fi

      - name: Checkout master
        if: steps.filter.outputs.qualifies == 'true'
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Check if this Grafana version is already tagged
        id: tag_check
        if: steps.filter.outputs.qualifies == 'true'
        run: |
          VERSION="${{ steps.grafana.outputs.version }}"
          EXISTING=$(git tag --list "${VERSION}.*")

          if [ -n "${EXISTING}" ]; then
            echo "already_tagged=true" >> "$GITHUB_OUTPUT"
            echo "Existing tags for ${VERSION}:"
            echo "${EXISTING}"
          else
            echo "already_tagged=false" >> "$GITHUB_OUTPUT"
            echo "No existing tags for ${VERSION}"
          fi

      - name: Decide whether to proceed
        id: decision
        if: steps.filter.outputs.qualifies == 'true'
        run: |
          ALREADY="${{ steps.tag_check.outputs.already_tagged }}"
          FORCE="${{ inputs.force_build }}"

          if [ "${ALREADY}" = "true" ] && [ "${FORCE}" != "true" ]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.grafana.outputs.version }} already tagged — nothing to do"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "Proceeding with ${{ steps.grafana.outputs.version }}"
          fi

      - name: Update Dockerfile
        id: update
        if: steps.decision.outputs.proceed == 'true'
        run: |
          VERSION="${{ steps.grafana.outputs.version }}"
          DATE=$(date +%Y%m%d)
          NEW_LABEL="${VERSION}.${DATE}"

          sed -i "s/ARG GRAFANA_VERSION=\"[^\"]*\"/ARG GRAFANA_VERSION=\"${VERSION}\"/" Dockerfile
          sed -i "s/LABEL version=\"[^\"]*\"/LABEL version=\"${NEW_LABEL}\"/"           Dockerfile

          echo "new_label=${NEW_LABEL}" >> "$GITHUB_OUTPUT"

          echo "Dockerfile after update:"
          grep -E "ARG GRAFANA_VERSION|LABEL version" Dockerfile

      - name: Commit, tag and push
        if: steps.decision.outputs.proceed == 'true'
        run: |
          NEW_LABEL="${{ steps.update.outputs.new_label }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Dockerfile
          git commit -m "${NEW_LABEL}"
          git tag "${NEW_LABEL}"
          git push origin HEAD:master
          git push origin "${NEW_LABEL}"

          echo "Pushed commit and tag: ${NEW_LABEL} — release.yml will now handle the build"

      - name: Display notification summary
        if: steps.filter.outputs.qualifies == 'true'
        run: |
          echo "========================================"
          echo "  Grafana Release Watcher — Notification"
          echo "========================================"
          echo "  Tag:           ${{ steps.grafana.outputs.tag }}"
          echo "  Version:       ${{ steps.grafana.outputs.version }}"
          echo "  Published:     ${{ steps.grafana.outputs.published }}"
          echo "  Already built: ${{ steps.tag_check.outputs.already_tagged }}"
          echo "  Would build:   ${{ steps.decision.outputs.proceed }}"
          echo "========================================"
